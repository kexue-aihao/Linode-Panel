services:
  mysql:
    image: mariadb:11
    container_name: linode-panel-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${LINODE_PANEL_DB_NAME:-linode_panel}
      MARIADB_USER: ${LINODE_PANEL_DB_USER:-linode_panel}
      MARIADB_PASSWORD: ${LINODE_PANEL_DB_PASSWORD:-change-this-password}
      MARIADB_ROOT_PASSWORD: ${LINODE_PANEL_DB_ROOT_PASSWORD:-change-this-root-password}
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: linode-panel-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT:-8089}:80"

  linode-panel:
    build: .
    container_name: linode-panel
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${LINODE_PANEL_PORT:-8088}:8088"
    environment:
      LINODE_PANEL_HOST: 0.0.0.0
      LINODE_PANEL_PORT: 8088
      LINODE_PANEL_DB_HOST: mysql
      LINODE_PANEL_DB_PORT: 3306
      LINODE_PANEL_DB_NAME: ${LINODE_PANEL_DB_NAME:-linode_panel}
      LINODE_PANEL_DB_USER: ${LINODE_PANEL_DB_USER:-linode_panel}
      LINODE_PANEL_DB_PASSWORD: ${LINODE_PANEL_DB_PASSWORD:-change-this-password}
